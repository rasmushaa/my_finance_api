# Deploy to Cloud Run Workflow
#
# This workflow builds and deploys a FastAPI application to Google Cloud Run
# with support for private Python packages from Google Artifact Registry.
#
# BRANCH LOGIC:
# - main branch         → runs tests + deploys to production environment (ENV=prod)
# - stg branch          → runs tests + deploys to staging environment (ENV=stg)
# - feature/* branches  → runs tests only (no deployment)
#
# PRIVATE PACKAGE AUTHENTICATION:
# Uses Google Cloud OAuth tokens to authenticate with private Python package registry.
# The workflow:
# 1. Gets OAuth token via `gcloud auth application-default print-access-token`
# 2. Sets UV environment variables: UV_INDEX_PRIVATE_USERNAME="oauth2accesstoken", UV_INDEX_PRIVATE_PASSWORD="<token>"
# 3. UV uses pyproject.toml configuration ([[tool.uv.index]] name="private") to access private packages
# 4. For Docker builds, token is passed as --secret and converted to UV vars inside Dockerfile
#
# DOCKER IMAGE:
# - Uses multi-stage approach: dependencies first (cached), then app code
# - Private package access via mounted OAuth token secret
# - Leverages pyproject.toml UV index configuration for private packages
# - Images tagged by environment: fastapi-prod:latest or fastapi-stg:latest
#
# REQUIRED GITHUB SECRETS:
# Authentication & Infrastructure:
#   GOOGLE_OAUTH_CLIENT_ID         - OAuth client ID for Google authentication
#   GOOGLE_OAUTH_CLIENT_SECRET     - OAuth client secret for Google authentication (from WIF pool provider)
#   GCP_PROJECT_ID                 - Google Cloud project ID
#   GCP_LOCATION                   - Google Cloud region (e.g., europe-north1)
#   GCP_WORKLOAD_IDENTITY_POOL     - Workload Identity Federation if format "projects/<project-number>/locations/global/workloadIdentityPools/<pool-name>/providers/<provider-name>"
#   GCP_DEPLOY_SA                  - Service account email for deployment
#   GCP_MY_FINANCE_API_SA          - Service account email for the Cloud Run service
#   GCP_BQ_DATASET                 - BigQuery dataset name for the application
#
# Application Configuration:
#   APP_JWT_SECRET                 - JWT signing secret for authentication
#   APP_JWT_EXP_DELTA_MINUTES      - JWT token expiration time in minutes
#
# MLflow Integration (for model artifacts):
#   MLFLOW_TRACKING_URI            - MLflow server URL
#   MLFLOW_TRACKING_USERNAME       - MLflow server username
#   MLFLOW_TRACKING_PASSWORD       - MLflow server password
#
name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - stg
      - 'feature/*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write' # This is crucial for Workload Identity Federation

    steps:
    - name: Init Environment Variables
      run: |
        # Determine environment based on branch
        if [ "${{ github.ref_name }}" == "main" ]; then
          echo "ENV=prod" >> $GITHUB_ENV
          echo "IMAGE_URI=${{ secrets.GCP_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-finance/fastapi-prod:latest" >> $GITHUB_ENV
          echo "SHOULD_DEPLOY=true" >> $GITHUB_ENV
        elif [ "${{ github.ref_name }}" == "stg" ]; then
          echo "ENV=stg" >> $GITHUB_ENV
          echo "IMAGE_URI=${{ secrets.GCP_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-finance/fastapi-stg:latest" >> $GITHUB_ENV
          echo "SHOULD_DEPLOY=true" >> $GITHUB_ENV
        else
          # Feature branch - no deployment needed
          echo "ENV=dev" >> $GITHUB_ENV
          echo "SHOULD_DEPLOY=false" >> $GITHUB_ENV
        fi

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Authenticate with Google Cloud
      uses: google-github-actions/auth@v2
      with:
        project_id : ${{ secrets.GCP_PROJECT_ID }}
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}
        service_account: ${{ secrets.GCP_DEPLOY_SA }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker to use gcloud as a credential helper
      run: |
        gcloud auth configure-docker ${{ secrets.GCP_LOCATION }}-docker.pkg.dev

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Create env-vars.yaml
      if: env.SHOULD_DEPLOY == 'true'
      run: |
        cat <<EOF > env-vars.yaml
        APP_JWT_SECRET: "${{ secrets.APP_JWT_SECRET }}"
        APP_JWT_EXP_DELTA_MINUTES: "${{ secrets.APP_JWT_EXP_DELTA_MINUTES }}"
        GOOGLE_OAUTH_CLIENT_ID: "${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}"
        GOOGLE_OAUTH_CLIENT_SECRET: "${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}"
        GCP_PROJECT_ID: "${{ secrets.GCP_PROJECT_ID }}"
        GCP_LOCATION: "${{ secrets.GCP_LOCATION }}"
        GCP_BQ_DATASET: "${{ secrets.GCP_BQ_DATASET }}"
        ENV: "${{ env.ENV }}"
        EOF

    - name: Create virtual environment
      run: uv venv

    - name: Install dependencies
      run: |
        TOKEN=$(gcloud auth application-default print-access-token)
        export UV_INDEX_PRIVATE_USERNAME="oauth2accesstoken"
        export UV_INDEX_PRIVATE_PASSWORD="${TOKEN}"
        # Use uv sync to leverage pyproject.toml index configuration
        uv sync --group dev
        python --version
        uv pip list

    - name: Run tests
      run: |
        export PYTHONPATH="${PYTHONPATH}:$(pwd)"
        uv run pytest

    - name: Load model artifacts
      if: env.SHOULD_DEPLOY == 'true'
      run: |
        export MLFLOW_TRACKING_URI="${{ secrets.MLFLOW_TRACKING_URI }}"
        export MLFLOW_TRACKING_USERNAME="${{ secrets.MLFLOW_TRACKING_USERNAME }}"
        export MLFLOW_TRACKING_PASSWORD="${{ secrets.MLFLOW_TRACKING_PASSWORD }}"
        export ENV="${{ env.ENV }}"
        uv run python scripts/load_model_artifacts.py

    - name: Build and Push Docker image
      if: env.SHOULD_DEPLOY == 'true'
      run: |
        TOKEN=$(gcloud auth application-default print-access-token)
        # Create temp file for BuildKit secret (more reliable than piping)
        TOKEN_FILE=$(mktemp)
        echo -n "$TOKEN" > "$TOKEN_FILE"

        DOCKER_BUILDKIT=1 docker build \
          --secret id=oauth_token,src="$TOKEN_FILE" \
          --build-arg ENV="${{ env.ENV }}" \
          -t "${{ env.IMAGE_URI }}" .

        # Cleanup temp file
        rm -f "$TOKEN_FILE"

        docker push "${{ env.IMAGE_URI }}"

    - name: Deploy Cloud Run Job
      if: env.SHOULD_DEPLOY == 'true'
      run: |
        gcloud run deploy my-finance-api-${{ env.ENV }} \
          --image "${{ env.IMAGE_URI }}" \
          --region ${{ secrets.GCP_LOCATION }} \
          --service-account ${{ secrets.GCP_MY_FINANCE_API_SA }} \
          --env-vars-file env-vars.yaml \
          --port 8080 \
          --cpu 1 \
          --memory 1000Mi \
          --max-instances 1 \
          --allow-unauthenticated
